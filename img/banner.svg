<svg xmlns="http://www.w3.org/2000/svg"
     width="1600"
     height="500"
     viewBox="0 0 1600 500"
     role="img"
     aria-labelledby="title desc">
  <title id="title">Samuel Štefánik — Backend &amp; Full-Stack Developer</title>
  <desc id="desc">
    Responsive GitHub profile banner with adaptive light and dark color schemes.
  </desc>

  <style>
    :root {
      color-scheme: light dark;
    }

    .bg {
      fill: #f6f8fa;
    }

    .border {
      fill: none;
      stroke: #d0d7de;
    }

    .title {
      fill: #1f2328;
    }

    .subtitle {
      fill: #0969da;
    }

    .body {
      fill: #57606a;
    }

    .chip {
      fill: #ffffff;
      stroke: #d0d7de;
    }

    .chip-text {
      fill: #24292f;
    }

    .line {
      stroke: url(#accentLight);
    }

    .orbit-main {
      stroke: #0969da;
    }

    .orbit-secondary {
      stroke: #54aeff;
    }

    .orbit-muted {
      stroke: #b6d7ff;
    }

    .dot {
      fill: #8c959f;
    }

    .code {
      stroke: #0969da;
    }

    .glow {
      fill: url(#glowLight);
    }

    @media (prefers-color-scheme: dark) {
      .bg {
        fill: #071426;
      }

      .border {
        stroke: #173f73;
      }

      .title {
        fill: #f0f6fc;
      }

      .subtitle {
        fill: #58a6ff;
      }

      .body {
        fill: #b7c5d8;
      }

      .chip {
        fill: #0d223f;
        stroke: #2a66a7;
      }

      .chip-text {
        fill: #eaf4ff;
      }

      .line {
        stroke: url(#accentDark);
      }

      .orbit-main {
        stroke: #2f81f7;
      }

      .orbit-secondary {
        stroke: #38bdf8;
      }

      .orbit-muted {
        stroke: #173f73;
      }

      .dot {
        fill: #2b5f9c;
      }

      .code {
        stroke: #58a6ff;
      }

      .glow {
        fill: url(#glowDark);
      }
    }

    text {
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }
  </style>

  <defs>
    <linearGradient id="accentLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0969da"/>
      <stop offset="100%" stop-color="#54aeff"/>
    </linearGradient>

    <linearGradient id="accentDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f81f7"/>
      <stop offset="100%" stop-color="#45e0ff"/>
    </linearGradient>

    <radialGradient id="glowLight" cx="80%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#ddf4ff" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#ddf4ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowDark" cx="80%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#135bd9" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#135bd9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect class="bg" width="1600" height="500" rx="28"/>
  <rect class="glow" width="1600" height="500" rx="28"/>
  <rect class="border" x="1.5" y="1.5" width="1597" height="497" rx="26.5" stroke-width="3"/>

  <!-- Code mark -->
  <g transform="translate(74 68)"
     class="code"
     stroke-width="5"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none">
    <path d="M24 0 0 20l24 20"/>
    <path d="M64 0 88 20 64 40"/>
    <path d="M52 -6 36 46"/>
  </g>

  <line class="line"
        x1="164"
        y1="88"
        x2="360"
        y2="88"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Main content -->
  <text class="title"
        x="74"
        y="202"
        font-size="72"
        font-weight="760"
        letter-spacing="-1.6">
    Samuel Štefánik
  </text>

  <text class="subtitle"
        x="76"
        y="252"
        font-size="25"
        font-weight="700"
        letter-spacing="4.7">
    BACKEND &amp; FULL-STACK DEVELOPER
  </text>

  <line class="line"
        x1="76"
        y1="291"
        x2="206"
        y2="291"
        stroke-width="4"
        stroke-linecap="round"/>

  <text class="body"
        x="76"
        y="346"
        font-size="28"
        font-weight="400">
    Building maintainable and scalable web applications.
  </text>

  <!-- Technology chips -->
  <g font-size="19" font-weight="650">
    <g transform="translate(76 389)">
      <rect class="chip" width="150" height="52" rx="14"/>
      <text class="chip-text" x="75" y="33" text-anchor="middle">TypeScript</text>
    </g>

    <g transform="translate(242 389)">
      <rect class="chip" width="108" height="52" rx="14"/>
      <text class="chip-text" x="54" y="33" text-anchor="middle">PHP</text>
    </g>

    <g transform="translate(366 389)">
      <rect class="chip" width="130" height="52" rx="14"/>
      <text class="chip-text" x="65" y="33" text-anchor="middle">Next.js</text>
    </g>

    <g transform="translate(512 389)">
      <rect class="chip" width="130" height="52" rx="14"/>
      <text class="chip-text" x="65" y="33" text-anchor="middle">Laravel</text>
    </g>

    <g transform="translate(658 389)">
      <rect class="chip" width="120" height="52" rx="14"/>
      <text class="chip-text" x="60" y="33" text-anchor="middle">Prisma</text>
    </g>

    <g transform="translate(794 389)">
      <rect class="chip" width="160" height="52" rx="14"/>
      <text class="chip-text" x="80" y="33" text-anchor="middle">PostgreSQL</text>
    </g>
  </g>

  <!-- Right-side orbital graphic -->
  <g transform="translate(1310 250)" fill="none">
    <circle class="orbit-muted" r="250" stroke-width="3"/>
    <circle class="orbit-main" r="196" stroke-width="3"/>
    <circle class="orbit-secondary"
            r="145"
            stroke-width="2"
            stroke-dasharray="12 13"/>

    <path class="orbit-secondary"
          d="M-170 -184 A250 250 0 0 1 85 -235"
          stroke-width="4"/>

    <circle cx="-139" cy="-208" r="11" fill="#45e0ff"/>
    <circle class="orbit-main" cx="-220" cy="95" r="11" stroke-width="3"/>

    <g class="orbit-main" stroke-width="4" stroke-linecap="round">
      <path d="M110 72h30"/>
      <path d="M125 57v30"/>
    </g>
  </g>

  <!-- Dot matrices -->
  <g class="dot">
    <g transform="translate(710 50)">
      <circle cx="0" cy="0" r="3"/>
      <circle cx="28" cy="0" r="3"/>
      <circle cx="56" cy="0" r="3"/>
      <circle cx="84" cy="0" r="3"/>
      <circle cx="112" cy="0" r="3"/>

      <circle cx="0" cy="28" r="3"/>
      <circle cx="28" cy="28" r="3"/>
      <circle cx="56" cy="28" r="3"/>
      <circle cx="84" cy="28" r="3"/>
      <circle cx="112" cy="28" r="3"/>

      <circle cx="0" cy="56" r="3"/>
      <circle cx="28" cy="56" r="3"/>
      <circle cx="56" cy="56" r="3"/>
      <circle cx="84" cy="56" r="3"/>
      <circle cx="112" cy="56" r="3"/>
    </g>

    <g transform="translate(1390 388)">
      <circle cx="0" cy="0" r="3"/>
      <circle cx="28" cy="0" r="3"/>
      <circle cx="56" cy="0" r="3"/>
      <circle cx="84" cy="0" r="3"/>

      <circle cx="0" cy="28" r="3"/>
      <circle cx="28" cy="28" r="3"/>
      <circle cx="56" cy="28" r="3"/>
      <circle cx="84" cy="28" r="3"/>

      <circle cx="0" cy="56" r="3"/>
      <circle cx="28" cy="56" r="3"/>
      <circle cx="56" cy="56" r="3"/>
      <circle cx="84" cy="56" r="3"/>
    </g>
  </g>
</svg>
