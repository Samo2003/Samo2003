<svg xmlns="http://www.w3.org/2000/svg"
     width="1600" height="440" viewBox="0 0 1600 440"
     role="img" aria-labelledby="title desc">
  <title id="title">Samuel Štefánik — Backend &amp; Full-Stack Developer</title>
  <desc id="desc">Minimal GitHub profile banner in light mode.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#EAF3FF"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A7DE1"/>
      <stop offset="100%" stop-color="#65B8FF"/>
    </linearGradient>

    <radialGradient id="glow" cx="78%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#B6D7FF" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#B6D7FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1600" height="440" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="440" rx="28" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="1597" height="437" rx="26.5"
        fill="none" stroke="#C9D8EA" stroke-width="3"/>

  <!-- Decorative grid -->
  <g fill="#9CB7D4" opacity=".75">
    <g transform="translate(695 62)">
      <circle cx="0" cy="0" r="3"/><circle cx="26" cy="0" r="3"/><circle cx="52" cy="0" r="3"/><circle cx="78" cy="0" r="3"/><circle cx="104" cy="0" r="3"/>
      <circle cx="0" cy="26" r="3"/><circle cx="26" cy="26" r="3"/><circle cx="52" cy="26" r="3"/><circle cx="78" cy="26" r="3"/><circle cx="104" cy="26" r="3"/>
      <circle cx="0" cy="52" r="3"/><circle cx="26" cy="52" r="3"/><circle cx="52" cy="52" r="3"/><circle cx="78" cy="52" r="3"/><circle cx="104" cy="52" r="3"/>
    </g>
  </g>

  <!-- Code symbol -->
  <g transform="translate(78 66)" fill="none" stroke="url(#accent)"
     stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M24 0 0 20l24 20"/>
    <path d="M64 0 88 20 64 40"/>
    <path d="M52 -6 36 46"/>
  </g>
  <rect x="171" y="84" width="178" height="3" rx="2" fill="url(#accent)"/>

  <!-- Main text -->
  <text x="78" y="190" fill="#172033"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="70" font-weight="760" letter-spacing="-1.6">
    Samuel Štefánik
  </text>

  <text x="80" y="238" fill="#0B6FD3"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="24" font-weight="700" letter-spacing="4.5">
    BACKEND &amp; FULL-STACK DEVELOPER
  </text>

  <text x="80" y="300" fill="#5D6B7E"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="28" font-weight="400">
    Building maintainable, scalable, and reliable web applications.
  </text>

  <!-- Small focus chips -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif"
     font-size="18" font-weight="650">
    <g transform="translate(80 340)">
      <rect width="170" height="46" rx="13" fill="#FFFFFF" stroke="#CAD9EA"/>
      <text x="85" y="29" fill="#223047" text-anchor="middle">Backend Systems</text>
    </g>
    <g transform="translate(266 340)">
      <rect width="180" height="46" rx="13" fill="#FFFFFF" stroke="#CAD9EA"/>
      <text x="90" y="29" fill="#223047" text-anchor="middle">Web Applications</text>
    </g>
    <g transform="translate(462 340)">
      <rect width="165" height="46" rx="13" fill="#FFFFFF" stroke="#CAD9EA"/>
      <text x="82.5" y="29" fill="#223047" text-anchor="middle">Clean Architecture</text>
    </g>
  </g>

  <!-- Right-side abstract orbit -->
  <g transform="translate(1275 220)" fill="none">
    <circle r="245" stroke="#C8DDF5" stroke-width="3"/>
    <circle r="188" stroke="#2A7DE1" stroke-width="3"/>
    <circle r="132" stroke="#65B8FF" stroke-width="2" stroke-dasharray="10 13"/>
    <path d="M-170 -176 A245 245 0 0 1 86 -228"
          stroke="#65B8FF" stroke-width="4"/>
    <circle cx="-138" cy="-205" r="11" fill="#65B8FF"/>
    <circle cx="-211" cy="94" r="10" stroke="#2A7DE1" stroke-width="3"/>
    <g stroke="#2A7DE1" stroke-width="4" stroke-linecap="round">
      <path d="M115 65h30"/>
      <path d="M130 50v30"/>
    </g>
  </g>

  <!-- Subtle glow point -->
  <circle cx="1138" cy="58" r="34" fill="#B6D7FF" opacity=".24" filter="url(#soft)"/>
</svg>